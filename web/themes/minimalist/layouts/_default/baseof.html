<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #111111;
            --accent: #29b6f6; /* Gopher Blue */
            --muted: #888888;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --fg: #eeeeee;
                --muted: #666666;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: var(--bg);
            color: var(--fg);
        }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 40px; }
        header a { text-decoration: none; color: inherit; font-weight: bold; font-size: 1.5rem; }
        nav { float: right; }
        nav a { margin-left: 20px; text-decoration: none; color: var(--muted); }
        nav a:hover { color: var(--accent); }
        h1, h2, h3 { color: var(--accent); }
        code { background: rgba(128,128,128,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; }
        pre { background: rgba(128,128,128,0.05); padding: 20px; border-radius: 8px; overflow-x: auto; border: 1px solid rgba(128,128,128,0.1); }
        footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--muted); font-size: 0.8rem; color: var(--muted); text-align: center; }
        .gopher { display: block; margin: 40px auto; width: 120px; filter: grayscale(1); opacity: 0.5; transition: 0.3s; }
        .gopher:hover { filter: grayscale(0); opacity: 1; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/docs/">Docs</a>
            <a href="{{ .Site.Params.github }}">GitHub</a>
        </nav>
        <a href="/">codeye</a>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        &copy; {{ now.Year }} codeye · fast git porcelain lo-c scanner<br>
        built with go &amp; hugo · minimalist gopher vibes
    </footer>
</body>
</html>

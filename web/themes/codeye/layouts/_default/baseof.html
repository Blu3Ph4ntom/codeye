<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.subtitle }}{{ else }}{{ .Description | default .Site.Params.subtitle }}{{ end }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>👁</text></svg>">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo" style="text-decoration:none">
    codeye<span class="dot">.</span>
  </a>
  <div class="nav-links">
    <a href="/docs/install/" class="nav-link">Docs</a>
    <a href="https://github.com/codeye/codeye" class="btn-gh" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      GitHub
    </a>
  </div>
</nav>

{{ block "main" . }}{{ end }}

<footer class="footer">
  <div class="footer-logo">codeye<span class="dot">.</span></div>
  <div class="footer-links">
    <a href="/docs/install/">Docs</a>
    <a href="https://github.com/codeye/codeye" target="_blank" rel="noopener">GitHub</a>
    <a href="https://github.com/codeye/codeye/issues" target="_blank" rel="noopener">Issues</a>
  </div>
  <div class="footer-copy">MIT License</div>
</footer>

<script>
// Copy-to-clipboard for install pill
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const pill = btn.closest('.install-pill');
  const cmd  = pill?.dataset.cmd;
  if (!cmd) return;
  navigator.clipboard.writeText(cmd).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
});
</script>
</body>
</html>

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - misspell
    - unconvert
    - revive

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/blu3ph4ntom/codeye
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - unused
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m

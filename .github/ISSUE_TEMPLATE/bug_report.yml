name: Bug report
description: Report a defect in the CLI, installers, docs, or website.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command and repository context if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Paste `codeye version`, `codeye doctor`, OS, architecture, and `git --version`.
    validations:
      required: true

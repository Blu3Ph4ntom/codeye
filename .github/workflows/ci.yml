name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test -count=1 -timeout=120s ./...

      - name: build
        run: go build -ldflags "-s -w" -o codeye${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/codeye

      - name: smoke test
        shell: bash
        run: |
          ./codeye --version
          ./codeye doctor || true
          ./codeye .

  bench:
    name: benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      CGO_ENABLED: 0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: run benchmarks
        run: go test -run='^$' -bench=. -benchmem -benchtime=3s ./... | tee bench.txt

      - name: upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: bench.txt
          retention-days: 30

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: coverage
        run: go test -count=1 -coverprofile=coverage.out ./...

      - name: upload to codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  website:
    name: website
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"

      - name: build site
        working-directory: web
        run: hugo --minify
